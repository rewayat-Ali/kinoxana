name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2
        cmdline-tools: latest

    - name: Build APK
      run: |
        # Android SDK
        yes | /cmdline-tools/latest/bin/sdkmanager "platforms;android-33" 2>/dev/null || true
        export ANDROID_HOME=
        export ANDROID_SDK_ROOT=
        
        # Install Cordova
        npm install -g cordova@12.0.0
        npm install
        
        # Add platform
        npx cordova platform add android@12.0.1 --nofetch 2>/dev/null || true
        
        # ===== FIX: create proper gradle wrapper =====
        cd platforms/android
        # Remove the broken wrapper.gradle
        rm -f wrapper.gradle
        # Generate a clean gradle wrapper with Gradle 8.10
        gradle wrapper --gradle-version 8.10.2 2>/dev/null || /cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null
        cd ../..
        
        # Build
        cp platforms/android/gradlew ./gradlew 2>/dev/null || true
        npx cordova build android --debug 2>&1

    - name: Find APK
      run: find platforms/ -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: |
          platforms/android/**/*.apk