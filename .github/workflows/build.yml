name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Build APK
      run: |
        yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" 2>/dev/null || true
        npm install -g cordova
        npm install
        cordova platform add android --no-confirm 2>/dev/null || true
        cd platforms/android
        gradle wrapper --gradle-version 8.10 2>/dev/null || true
        cd ../..
        cordova build android --debug 2>&1

    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: |
          platforms/android/app/build/outputs/apk/**/*.apk
          platforms/android/build/outputs/apk/**/*.apk