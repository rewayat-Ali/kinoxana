name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openjdk-11-jdk android-sdk gradle 2>&1 | tail -5
        npm install -g cordova@11.1.3
        npm install

    - name: Platform & Build
      run: |
        export ANDROID_HOME=/usr/lib/android-sdk
        export ANDROID_SDK_ROOT=/usr/lib/android-sdk
        ls / 2>/dev/null || echo "No ANDROID_HOME"
        npx cordova platform add android@11.0.0 --no-confirm 2>&1 || echo "Platform add failed but continuing"
        npx cordova build android --debug 2>&1 || echo "Build failed"

    - name: Find APK
      run: find /home -name "*.apk" 2>/dev/null; find platforms/ -name "*.apk" 2>/dev/null || echo "No APK"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: platforms/android/**/*.apk