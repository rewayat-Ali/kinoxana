name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install tools and build
      run: |
        # Install required build tools
        yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" 2>/dev/null || true
        
        # Install Cordova
        npm install -g cordova
        
        # Build
        npm install
        cordova platform add android --no-confirm 2>/dev/null || echo 'platform exists'
        cordova build android --debug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk