name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Node + JDK
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install Cordova
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq android-sdk 2>/dev/null || true
        npm install -g cordova@11.1.3
        npm install

    - name: Add platform and build
      run: |
        export ANDROID_HOME=/usr/lib/android-sdk
        npx cordova platform add android@11.0.0 --no-confirm 2>/dev/null || echo "platform exists"
        npx cordova build android --debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: platforms/android/**/*.apk