name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova@12.0.0

    - name: Check environment
      run: |
        echo JAVA_HOME=
        echo ANDROID_HOME=
        java -version
        node --version
        npm --version
        cordova --version

    - name: Install dependencies and build
      run: |
        npm install
        cordova platform add android@12.0.1 --no-confirm 2>/dev/null || echo 'platform already exists, continuing'
        yes | sdkmanager --licenses 2>/dev/null || true
        cordova build android --debug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk
