name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Use Gradle 8.10
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.10'

    - name: Install Cordova latest
      run: npm install -g cordova

    - name: Build APK
      run: |
        npm install
        cordova platform add android --no-confirm 2>/dev/null || echo 'platform exists'
        sdkmanager --licenses < /dev/null 2>/dev/null || true
        cordova build android --debug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk
