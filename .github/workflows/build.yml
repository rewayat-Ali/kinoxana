name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova
      run: npm install -g cordova@12.0.0

    - name: Install dependencies
      run: npm install

    - name: Accept Android SDK licenses
      run: yes | /cmdline-tools/latest/bin/sdkmanager --licenses || yes | /cmdline-tools/latest/bin/sdkmanager --licenses || echo 'sdkmanager not found, trying other paths' && ls / && ls /

    - name: Add Android platform
      run: cordova platform add android@12.0.1 --no-confirm

    - name: Build Debug APK
      run: cordova build android --debug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk
