name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install tools
      run: |
        yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" 2>/dev/null || true

    - name: Install Cordova
      run: |
        npm install -g cordova
        npm install

    - name: Add platform
      run: |
        yes | /cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        npx cordova platform add android --no-confirm 2>/dev/null || true
        ls platforms/android/

    - name: Fix Gradle wrapper
      run: |
        cd platforms/android
        ls
        # Try to generate wrapper manually
        /usr/share/gradle-9.6.0/bin/gradle wrapper --gradle-version 8.10 2>/dev/null || true

    - name: Build
      run: |
        cd platforms/android
        export ANDROID_HOME=
        export ANDROID_SDK_ROOT=
        ./gradlew cdvBuildDebug --no-daemon 2>&1 || true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: kinoxana-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk